<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Fit </title>
  <style>
  .box{
    height : 400px;
    width : 600px ; 
    border : 2px solid black ; 
    background-color: antiquewhite;
    filter : invert(90%);
    
  }
 
@keyframes animateX{
  from{
    left : 0 ; 

  }
  to{
    left: 100%;
  }
}
@keyframes animateY{
  from{
    bottom : 0 ; 

  }
  to{
    bottom:  100%;
  }
}

  

  .ball{
    left: 0%;
    right: 0%;
    height: 25px;
    width: 33px;
    border-radius: 70px;
    background-color: red;
    border: white solid 2px ;
    animation:  animateX 3s linear infinite,
                animateY 3s ease-out infinite alternate ;
    position : absolute ; 
  }
  
  </style>
</head>
<body>
<div class = "box">

<div class = "ball"></div>

</div>

</body>
</html>
