<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Fit </title>
  <style>
  .box{
    height : 300px;
    width : 300px ; 
    border : 2px solid black ; 
    background-color: antiquewhite;
    filter : invert(90%);
  }
  img{
    height :  400px; 
    width: 300px ;
    object-fit:contain;
  }
  </style>
</head>
<body>
<div class = "box">

<img src="Image.png" alt="img">

</div>

</body>
</html>
